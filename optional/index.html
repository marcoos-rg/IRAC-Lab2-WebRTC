<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 2 IRAC WebRTC</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>

<body>

    <div class="container">
        <div class="video-grid">
            <div class="video-wrapper local-video-wrapper">
                <span>Local video</span>
                <video id="localVideo" muted autoplay playsinline></video>
            </div>
            <div class="video-wrapper remote-video-wrapper">
                <span>Remote video</span>
                <video id="remoteVideo" autoplay playsinline></video>
            </div>
        </div>

        <!-- Unified Navigation Bar -->
        <div class="mobile-nav">
            <button id="btnToggleChat">Chat</button>
            <button id="btnToggleFiles">Files</button>
            <button id="muteButton">Mute</button>
        </div>

        <div class="controls">
            <div id="chatContainer" class="chat-container">
                <label>Group Chat</label>
                <div id="chatMessages" class="chat-messages"></div>
                <div class="chat-input-row">
                    <textarea rows="2" id="dataChannelSend" disabled placeholder="Waiting for connection..."></textarea>
                    <div class="chat-button-group">
                        <button id="sendButton" disabled>Send</button>
                    </div>
                </div>
            </div>

            <div id="fileSection" class="chat-section">
                <label>Share Files</label>
                <div class="file-section-inner">
                    <div class="file-controls">
                        <input type="file" id="fileInput" disabled>
                        <button id="sendFileButton" disabled style="margin-top: 0; padding: 10px 20px;">Send
                            File</button>
                    </div>
                    <div id="fileProgress">
                        <div id="fileProgressInner"></div>
                    </div>
                    <div id="fileStatus" style="font-size: 0.85rem; color: var(--text-muted);">
                        Select a file to send
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src='/socket.io/socket.io.js'></script>
    <script src='js/completeNodeClientWithDataChannel.js'></script>

</body>

</html>
